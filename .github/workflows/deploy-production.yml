name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/jeffersonest/teddy-open-finance-nx-back-end
  FRONTEND_IMAGE: ghcr.io/jeffersonest/teddy-open-finance-nx-front-end
  VITE_API_URL: https://api.digai.chat
  DEPLOY_ROOT: /opt/teddy-open-finance
  NX_NO_CLOUD: 'true'

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npx nx build @teddy-open-finance/back-end

      - name: Prepare backend runtime package files
        run: npx nx run @teddy-open-finance/back-end:prune

      - name: Build frontend
        run: npx nx build @teddy-open-finance/front-end
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: apps/back-end
          file: apps/back-end/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: apps/front-end
          file: apps/front-end/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.PROD_VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          sed -i 's/\r$//' ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts

          host="${{ secrets.PROD_VPS_HOST }}"
          keyscan_succeeded=false
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 10 -H "$host" >> ~/.ssh/known_hosts 2>/dev/null; then
              keyscan_succeeded=true
              break
            fi
            echo "ssh-keyscan failed on attempt ${attempt}, retrying..."
            sleep 5
          done

          if [ "$keyscan_succeeded" != "true" ]; then
            echo "Failed to fetch SSH host key for ${host} after retries."
            exit 1
          fi

      - name: Sync deploy stack
        run: |
          rsync -az --delete \
            deploy/production/ \
            root@${{ secrets.PROD_VPS_HOST }}:${{ env.DEPLOY_ROOT }}/

      - name: Upload production environment file
        run: |
          cat <<'EOF' > /tmp/teddy-production.env
          APP_DOMAIN=teddy.digai.chat
          API_DOMAIN=api.digai.chat
          GRAFANA_DOMAIN=grafana.digai.chat
          BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          DATABASE_USER=${{ secrets.PROD_DATABASE_USER }}
          DATABASE_PASSWORD=${{ secrets.PROD_DATABASE_PASSWORD }}
          DATABASE_NAME=${{ secrets.PROD_DATABASE_NAME }}
          JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.PROD_JWT_EXPIRES_IN }}
          JWT_REFRESH_SECRET=${{ secrets.PROD_JWT_REFRESH_SECRET }}
          JWT_REFRESH_EXPIRES_IN=${{ secrets.PROD_JWT_REFRESH_EXPIRES_IN }}
          LOG_LEVEL=${{ secrets.PROD_LOG_LEVEL }}
          LOG_PRETTY=false
          LOG_APP_NAME=teddy-backend
          DATABASE_RUN_MIGRATIONS=true
          REQUIRED_MIGRATIONS_COUNT=3
          GF_SECURITY_ADMIN_USER=${{ secrets.PROD_GRAFANA_ADMIN_USER }}
          GF_SECURITY_ADMIN_PASSWORD=${{ secrets.PROD_GRAFANA_ADMIN_PASSWORD }}
          GHCR_USERNAME=${{ secrets.PROD_GHCR_USERNAME }}
          GHCR_TOKEN=${{ secrets.PROD_GHCR_TOKEN }}
          CLEAN_LEGACY_STACK=true
          EOF
          scp /tmp/teddy-production.env root@${{ secrets.PROD_VPS_HOST }}:${{ env.DEPLOY_ROOT }}/.env

      - name: Deploy on VPS
        run: |
          ssh root@${{ secrets.PROD_VPS_HOST }} "chmod +x ${{ env.DEPLOY_ROOT }}/scripts/deploy.sh && ${{ env.DEPLOY_ROOT }}/scripts/deploy.sh"
