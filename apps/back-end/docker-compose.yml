services:
  postgres:
    image: postgres:16-alpine
    container_name: teddy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-teddy}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-teddy}
      POSTGRES_DB: ${DATABASE_NAME:-teddy_open_finance}
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    volumes:
      - teddy-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-teddy} -d ${DATABASE_NAME:-teddy_open_finance}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  teddy-pgdata:
